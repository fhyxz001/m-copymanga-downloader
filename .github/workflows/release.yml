name: Android Release

on:
  push:
    branches:
      - main 
      - master
  workflow_dispatch:
    inputs:
      version:
        description: '手动触发的版本号 (如 1.0.0),留空则从最近一次提交信息中提取'
        required: false

permissions:
  contents: write

jobs:
  release:
    name: Build & Release APK
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '发布v') ||
      contains(github.event.head_commit.message, '发布 v') ||
      contains(github.event.head_commit.message, 'release v') ||
      contains(github.event.head_commit.message, 'Release v')

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 提取版本号
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            COMMIT_MSG="${{ github.event.head_commit.message }}"
            # 匹配: 发布v1.0 / 发布 v1.0.0 / 发布V1.0.0.1 / release v1.2
            # 版本号支持 2~4 段,如 1.0、1.0.0、1.0.0.1
            if [[ "$COMMIT_MSG" =~ (发布|release|Release)[[:space:]]*v?[[:space:]]*([0-9]+(\.[0-9]+){1,3}) ]]; then
              VERSION="${BASH_REMATCH[2]}"
            else
              echo "未在提交信息中检测到版本号: $COMMIT_MSG"
              exit 1
            fi
          fi
          # 去除可能的前导 v
          VERSION="${VERSION#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "TAG=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "检测到版本: $VERSION"

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: 赋予 gradlew 执行权限
        run: chmod +x gradlew

      - name: 更新 build.gradle.kts 中的版本号
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          # 更新 versionName
          sed -i -E "s/(versionName\s*=\s*\")[0-9.]*(\")/\\1${VERSION}\\2/" app/build.gradle.kts
          # 自动递增 versionCode
          CURRENT_CODE=$(grep -oE 'versionCode\s*=\s*[0-9]+' app/build.gradle.kts | grep -oE '[0-9]+')
          NEW_CODE=$((CURRENT_CODE + 1))
          sed -i -E "s/(versionCode\s*=\s*)[0-9]+/\\1${NEW_CODE}/" app/build.gradle.kts
          echo "versionName 更新为 $VERSION,versionCode 更新为 $NEW_CODE"
          grep -E "version(Name|Code)" app/build.gradle.kts

      - name: 解码签名密钥
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.p12
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: 编译 Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace
        env:
          KEYSTORE_FILE: release.p12
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: 定位产物
        id: apk
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -maxdepth 1 -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "未找到 APK 产物"
            ls -R app/build/outputs/ || true
            exit 1
          fi
          VERSION="${{ steps.version.outputs.VERSION }}"
          NEW_NAME="m-copymanga-downloader-v${VERSION}.apk"
          cp "$APK_PATH" "app/build/outputs/apk/release/${NEW_NAME}"
          echo "APK_PATH=app/build/outputs/apk/release/${NEW_NAME}" >> "$GITHUB_OUTPUT"
          echo "已准备产物: $NEW_NAME"

      - name: 验证 Tag 是否已存在
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.VERSION }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 创建并推送 Tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.version.outputs.VERSION }}" -m "v${{ steps.version.outputs.VERSION }}"
          git push origin "v${{ steps.version.outputs.VERSION }}"

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: "v${{ steps.version.outputs.VERSION }}"
          body: |
            ## 📦 发布说明
            **版本**: v${{ steps.version.outputs.VERSION }}
            **触发提交**: ${{ github.event.head_commit.message }}
            **提交哈希**: `${{ github.event.head_commit.id }}`
            **构建时间**: ${{ github.event.repository.updated_at }}

            ---
            由 GitHub Actions 自动构建发布 🤖
          files: ${{ steps.apk.outputs.APK_PATH }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
